[defaults]
output_dir = "recon"
port = 5000
open_browser = true
timeout = 60
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
sync_api = ""
wordlist = "/usr/share/wordlists/SecLists/Discovery/Web-Content/burp-parameter-names.txt"

[tools]
katana = "katana"
subfinder = "subfinder"
gau = "gau"
waybackurls = "waybackurls"
waymore = "waymore"
httpx = "httpx"
x8 = "x8"
arjun = "arjun"
uro = "uro"

[mode.quick]
phases = ["intake","robots","js_discovery","js_extract","output"]

[mode.standard]
phases = ["intake","robots","urls","js_discovery","js_extract","deep","output"]

[mode.full]
phases = ["intake","subdomains","robots","urls","js_discovery","js_extract","deep","output"]

[mode.watch]
phases = ["intake","robots","urls","js_discovery","js_extract","output","monitor"]

[alerts]
discord_webhook = ""
telegram_token = ""
telegram_chat_id = ""
