[defaults]
output_dir = "recon"
port = 5000
open_browser = true
timeout = 60
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
sync_api = ""
wordlist = "/usr/share/wordlists/SecLists/Discovery/Web-Content/burp-parameter-names.txt"

[tools]
katana       = "katana"
subfinder    = "subfinder"
amass        = "amass"
chaos        = "chaos"
gau          = "gau"
waybackurls  = "waybackurls"
waymore      = "waymore"
httpx        = "httpx"
x8           = "x8"
arjun        = "arjun"
uro          = "uro"
xnLinkFinder = "xnLinkFinder"

[mode.quick]
# Fast, no external tools: robots → JS → AST params → endpoint crawl
phases = [
  "intake",
  "robots",
  "js_discovery",
  "js_extract",
  "endpoint_crawl",
  "output",
]

[mode.standard]
# Passive harvest + JS + deep param discovery + xnLinkFinder crawl
phases = [
  "intake",
  "robots",
  "urls",
  "js_discovery",
  "js_extract",
  "endpoint_crawl",
  "deep",
  "crawl",
  "output",
]

[mode.full]
# Everything: subdomains + standard
phases = [
  "intake",
  "subdomains",
  "robots",
  "urls",
  "js_discovery",
  "js_extract",
  "endpoint_crawl",
  "deep",
  "crawl",
  "output",
]

[mode.watch]
phases = [
  "intake",
  "robots",
  "urls",
  "js_discovery",
  "js_extract",
  "output",
  "monitor",
]

[alerts]
discord_webhook  = ""
telegram_token   = ""
telegram_chat_id = ""
